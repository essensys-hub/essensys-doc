name: Build documentation site

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'archi/**'
      - 'mkdocs.yml'
      - 'scripts/prepare-docs.sh'
      - '.github/workflows/docs-site.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout essensys-doc
        uses: actions/checkout@v4

      - name: Checkout essensys-ansible
        uses: actions/checkout@v4
        with:
          repository: essensys-hub/essensys-ansible
          path: vendor/essensys-ansible

      - name: Checkout essensys-raspberry-install
        uses: actions/checkout@v4
        with:
          repository: essensys-hub/essensys-raspberry-install
          path: vendor/essensys-raspberry-install

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: pip install -r requirements.txt

      - name: Prepare docs
        run: bash scripts/prepare-docs.sh

      - name: Build site
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: essensys-docs-site
          path: site/
