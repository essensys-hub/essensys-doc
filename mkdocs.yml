site_name: Essensys Documentation
site_description: Documentation publique Essensys — architecture, installation, guides utilisateur
site_author: Essensys Team
site_url: https://docs.essensys.fr

repo_name: essensys-hub/essensys-doc
repo_url: https://github.com/essensys-hub/essensys-doc
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Accueil: index.md
  - Installation:
    - install/index.md
    - Gateway CM5: install/gateway-cm5.md
    - HTTPS local: install/https-local.md
    - Raspberry Pi: install/raspberry-pi.md
  - Architecture:
    - Vue d'ensemble: architecture/overview.md
    - Table d'echange: architecture/exchange-table.md
    - Domaines fonctionnels: architecture/domaines-fonctionnels.md
    - Pattern Bridge: architecture/bridge-pattern.md
    - Deploiement: architecture/deployment.md
    - Conteneurs: architecture/containers.md
    - Materiel: architecture/hardware-overview.md
    - Diagrammes: architecture/diagrams.md
    - Client legacy: architecture/legacy-client.md

extra:
  generator: false
